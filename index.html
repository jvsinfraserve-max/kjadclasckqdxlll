<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JVS Infraserve — Billing &amp; Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root{
  --navy:#132C39;
  --navy-2:#1F4E5F;
  --blue:#2E75B6;
  --blue-2:#3D8BD4;
  --blue-light:#EAF1FB;
  --bg:#F3F6FB;
  --card:#FFFFFF;
  --line:#E5EAF1;
  --text:#182430;
  --text-muted:#5B6B7A;
  --green:#1E7B34;
  --green-bg:#E6F4EA;
  --amber:#9A6B00;
  --amber-bg:#FFF4DD;
  --red:#B3261E;
  --red-bg:#FCEAEA;
  --grey-bg:#EEF1F5;
  --radius:12px;
  --shadow:0 1px 2px rgba(19,44,57,.05), 0 2px 8px rgba(19,44,57,.04);
  --shadow-md:0 4px 14px rgba(19,44,57,.08), 0 1px 3px rgba(19,44,57,.06);
  --shadow-lg:0 12px 32px rgba(19,44,57,.14), 0 2px 6px rgba(19,44,57,.06);
  --ease:cubic-bezier(.2,.7,.3,1);
  --font-head:'Space Grotesk',sans-serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  font-family:var(--font-body);
  background:
    radial-gradient(1100px 500px at 100% -10%, rgba(46,117,182,.06), transparent 60%),
    radial-gradient(900px 500px at -10% 0%, rgba(31,78,95,.05), transparent 55%),
    var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:var(--font-head);margin:0;color:var(--navy);}
a{color:var(--blue);}
button{font-family:var(--font-body);cursor:pointer;}
input,select,textarea{font-family:var(--font-body);}
::selection{background:var(--blue-light);}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;}

/* ============================================================
   LAYOUT
   ============================================================ */
#appShell{display:flex;min-height:100vh;}
.sidebar{
  width:230px;flex:0 0 230px;
  background:linear-gradient(180deg,var(--navy) 0%,#0F2531 100%);
  color:#fff;
  display:flex;flex-direction:column;padding:20px 0;position:sticky;top:0;height:100vh;
  box-shadow:2px 0 20px rgba(0,0,0,.12);
}
.brand{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:14px;}
.brand-mark{font-family:var(--font-head);font-weight:700;font-size:18px;letter-spacing:.02em;line-height:1.2;}
.brand-sub{font-size:11px;color:#9FB4C2;margin-top:3px;letter-spacing:.03em;text-transform:uppercase;}
.nav{list-style:none;margin:0;padding:0 10px;flex:1;}
.nav li{margin-bottom:2px;}
.nav button{
  width:100%;text-align:left;background:none;border:none;color:#C7D6E0;
  padding:10px 12px;border-radius:9px;font-size:14px;font-weight:500;
  display:flex;align-items:center;gap:10px;transition:background .16s var(--ease),color .16s var(--ease),transform .12s var(--ease);
  position:relative;
}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff;transform:translateX(1px);}
.nav button.active{background:linear-gradient(135deg,var(--blue),var(--blue-2));color:#fff;box-shadow:0 4px 12px rgba(46,117,182,.35);}
.nav .ic{width:18px;text-align:center;font-size:15px;}
.sidebar-foot{padding:14px 20px 0;border-top:1px solid rgba(255,255,255,.1);margin-top:10px;}
.sidebar-foot button{width:100%;background:none;border:1px solid rgba(255,255,255,.18);color:#C7D6E0;padding:8px;border-radius:8px;font-size:12.5px;transition:background .15s,border-color .15s;}
.sidebar-foot button:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.32);}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  background:rgba(255,255,255,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  padding:14px 26px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:5;
  box-shadow:0 1px 0 rgba(19,44,57,.02), 0 4px 16px rgba(19,44,57,.04);
}
.topbar h1{font-size:19px;letter-spacing:-.01em;}
.topbar .meta{font-size:12.5px;color:var(--text-muted);margin-top:2px;}
.content{padding:24px 26px 60px;flex:1;}
.hamburger{display:none;background:none;border:none;font-size:20px;color:var(--navy);}

/* ============================================================
   COMPONENTS
   ============================================================ */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);transition:box-shadow .18s var(--ease);}
.card-pad{padding:20px;}
.section-title{font-size:15px;font-weight:600;color:var(--navy);margin:0 0 14px;display:flex;align-items:center;gap:8px;}
.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:box-shadow .18s var(--ease),transform .18s var(--ease);}
.kpi:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--line);}
.kpi .label{font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.kpi .value{font-family:var(--font-mono);font-size:23px;font-weight:700;color:var(--navy);margin-top:6px;letter-spacing:-.01em;}
.kpi .sub{font-size:11.5px;color:var(--text-muted);margin-top:4px;}
.kpi.accent::before{background:linear-gradient(90deg,var(--blue),var(--blue-2));}
.kpi.warn::before{background:linear-gradient(90deg,#C98A00,var(--amber));}
.kpi.good::before{background:linear-gradient(90deg,var(--green),#2FA84F);}

.btn{
  display:inline-flex;align-items:center;gap:6px;border-radius:9px;border:1px solid var(--line);
  background:#fff;color:var(--text);padding:9px 14px;font-size:13.5px;font-weight:600;
  transition:border-color .15s var(--ease),color .15s var(--ease),background .15s var(--ease),box-shadow .15s var(--ease),transform .08s var(--ease);
  white-space:nowrap;
}
.btn:hover{border-color:var(--blue);color:var(--blue);box-shadow:0 2px 8px rgba(46,117,182,.14);}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue-2));border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(46,117,182,.25);}
.btn-primary:hover{filter:brightness(1.06);color:#fff;box-shadow:0 4px 14px rgba(46,117,182,.35);}
.btn-navy{background:var(--navy-2);border-color:var(--navy-2);color:#fff;}
.btn-navy:hover{background:var(--navy);color:#fff;}
.btn-danger{color:var(--red);}
.btn-danger:hover{background:var(--red-bg);border-color:var(--red);}
.btn-sm{padding:6px 10px;font-size:12.5px;}
.btn-ghost{background:none;border:none;color:var(--text-muted);}
.btn-ghost:hover{color:var(--blue);}
.btn[disabled]{opacity:.5;cursor:not-allowed;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}

label{display:block;font-size:12.5px;font-weight:600;color:var(--text-muted);margin-bottom:5px;}
.field{margin-bottom:14px;}
input[type=text],input[type=number],input[type=date],input[type=email],input[type=tel],input[type=password],select,textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;
  background:#fff;color:var(--text);transition:border-color .15s var(--ease),box-shadow .15s var(--ease);
}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,117,182,.14);}
textarea{resize:vertical;min-height:70px;}
.field-row{display:flex;gap:12px;}
.field-row>.field{flex:1;}
.hint{font-size:11.5px;color:var(--text-muted);margin-top:4px;}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);}
.checkbox-row input{width:auto;}

table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  background:linear-gradient(135deg,var(--blue),var(--blue-2));color:#fff;text-align:left;padding:11px 12px;font-weight:600;
  font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;
}
thead th:first-child{border-top-left-radius:var(--radius);}
thead th:last-child{border-top-right-radius:var(--radius);}
tbody td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle;}
tbody tr{transition:background .12s var(--ease);}
tbody tr:hover{background:var(--blue-light);}
tbody tr:last-child td{border-bottom:none;}
.num{font-family:var(--font-mono);text-align:right;white-space:nowrap;}
.tfoot-row td{background:var(--grey-bg);font-weight:700;border-top:2px solid var(--navy-2);}
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
.table-wrap table{border:none;}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);}
.badge-paid{background:var(--green-bg);color:var(--green);}
.badge-partial{background:var(--amber-bg);color:var(--amber);}
.badge-unpaid{background:var(--red-bg);color:var(--red);}
.badge-overdue{background:#F8D7D5;color:#7A1712;}
.badge-cancelled{background:var(--grey-bg);color:var(--text-muted);}

.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;justify-content:space-between;}
.toolbar-left,.toolbar-right{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.search-box{position:relative;}
.search-box input{padding-left:30px;width:220px;}
.search-box::before{content:"⌕";position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);}

.empty-state{text-align:center;padding:56px 20px;color:var(--text-muted);}
.empty-state .big{font-size:38px;margin-bottom:12px;filter:drop-shadow(0 4px 10px rgba(19,44,57,.12));}
.empty-state h3{color:var(--navy);margin-bottom:6px;font-size:16px;}

.modal-overlay{
  position:fixed;inset:0;background:rgba(11,25,32,.55);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;
  z-index:100;padding:20px;animation:overlayIn .15s var(--ease);
}
@keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
.modal-box{background:#fff;border-radius:var(--radius);max-width:560px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .2s var(--ease);}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{font-size:16px;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}
.modal-close{background:none;border:none;font-size:20px;color:var(--text-muted);line-height:1;transition:color .12s;}
.modal-close:hover{color:var(--red);}

.toast-wrap{position:fixed;top:18px;right:18px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--navy);color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;box-shadow:var(--shadow-lg);animation:slideIn .22s var(--ease);}
.toast.error{background:var(--red);}
.toast.success{background:var(--green);}
@keyframes slideIn{from{transform:translateX(30px);opacity:0;}to{transform:translateX(0);opacity:1;}}

.line-items-table input,.line-items-table select{padding:7px 8px;font-size:13px;}
.line-items-table td{padding:6px;}
.custom-fields-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.custom-field-row{display:flex;gap:8px;align-items:center;}
.custom-field-row input{flex:1;}

.gate-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:
    radial-gradient(700px 400px at 15% 15%, rgba(46,117,182,.35), transparent 60%),
    radial-gradient(800px 500px at 85% 85%, rgba(61,139,212,.25), transparent 55%),
    linear-gradient(160deg,var(--navy) 0%,#0B1E28 100%);
}
.gate-card{
  background:#fff;border-radius:18px;padding:38px 34px;max-width:380px;width:100%;
  box-shadow:0 24px 70px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.15);
  border-top:4px solid var(--blue);
  animation:gateIn .35s var(--ease);
}
@keyframes gateIn{from{opacity:0;transform:translateY(8px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.gate-card h2{margin-bottom:6px;font-size:22px;}
.gate-card .pin-input{font-size:26px;letter-spacing:12px;text-align:center;font-family:var(--font-mono);}
.gate-error{color:var(--red);font-size:12.5px;margin-top:8px;min-height:16px;}
.config-error{max-width:640px;margin:60px auto;}
.config-error pre{background:#0F2530;color:#C7D6E0;padding:16px;border-radius:8px;overflow-x:auto;font-size:12.5px;}

.chart-bars{display:flex;align-items:flex-end;gap:6px;height:160px;margin-top:10px;}
.chart-bar{flex:1;background:linear-gradient(180deg,var(--blue),var(--navy-2));border-radius:4px 4px 0 0;position:relative;min-height:2px;}
.chart-bar .bar-label{position:absolute;bottom:-20px;left:0;right:0;text-align:center;font-size:9.5px;color:var(--text-muted);}
.chart-bar .bar-value{position:absolute;top:-18px;left:0;right:0;text-align:center;font-size:9.5px;font-family:var(--font-mono);color:var(--navy);font-weight:600;}
.chart-wrap{padding-bottom:24px;}

.client-tag{font-size:12px;color:var(--text-muted);}
.pill{display:inline-block;background:var(--blue-light);color:var(--blue);padding:2px 8px;border-radius:12px;font-size:11.5px;font-weight:600;}

/* Print templates hidden on-screen */
.print-only{display:none;}
@page{ margin:0; background:#fff; }
@media print{
  html,body{background:#fff !important;}
  body > *{display:none !important;}
  body.print-invoice > #printInvoiceArea{display:block !important;}
  body.print-ledger > #printLedgerArea{display:block !important;}
  #printInvoiceArea,#printLedgerArea{background:#fff !important;}
  .no-print{display:none !important;}
}
.pdoc{font-family:var(--font-body);color:#111;padding:30px;max-width:820px;margin:0 auto;font-size:12.5px;background:#fff;}
.pdoc h2{text-align:center;text-decoration:underline;font-family:var(--font-body);letter-spacing:.05em;margin-bottom:16px;}
.pdoc table{font-size:12px;}
.pdoc .box{border:1px solid #333;padding:10px;}
.pdoc .flex2{display:flex;gap:0;border:1px solid #333;border-bottom:none;}
.pdoc .flex2>div{flex:1;padding:10px;font-size:12px;}
.pdoc .flex2>div:first-child{border-right:1px solid #333;}
.pdoc table.items{width:100%;border-collapse:collapse;border:1px solid #333;}
.pdoc table.items th,.pdoc table.items td{border:1px solid #333;padding:6px 8px;font-size:11.5px;}
.pdoc table.items th{background:#e5e5e5;}
.pdoc .totals-row td{padding:4px 8px;font-size:12px;}
.pdoc .sig{margin-top:40px;text-align:right;}
.ledger-print-head{background:var(--navy-2);color:#fff;padding:16px 20px;margin:-30px -30px 20px;}

/* New invoice print layout (matches JVS reference format) */
.pdoc2{font-family:Arial,Helvetica,sans-serif;color:#111;padding:26px 30px;max-width:820px;margin:0 auto;font-size:12px;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.pdoc2 table{border-collapse:collapse;width:100%;}
.ph-headrow td{vertical-align:top;padding:0;}
.ph-logo{height:52px;max-width:200px;object-fit:contain;}
.ph-bizname{font-size:20px;font-weight:700;color:#1F4E5F;}
.ph-doctitle{font-size:22px;font-weight:700;color:#333;}
.ph-disclaimer{text-align:center;font-size:10.5px;color:#a33;margin:2px 0 10px;}
.ph-info{margin-top:14px;border:1px solid #333;}
.ph-info td{border-right:1px solid #333;padding:10px;font-size:11.5px;vertical-align:top;}
.ph-info td:last-child{border-right:none;}
.ph-info-col{width:24%;}
.ph-info-col > div{margin-bottom:8px;}
.ph-label{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.02em;}
.ph-box{width:38%;}
.ph-box-label{font-weight:700;font-size:11.5px;margin-bottom:4px;}
.ph-items{margin-top:0;border:1px solid #333;border-top:none;}
.ph-items th,.ph-items td{border:1px solid #333;padding:6px 7px;font-size:10.8px;}
.ph-items th{background:#e5e5e5;text-align:left;}
.ph-stack-totals{width:auto;margin-left:auto;margin-top:0;border:1px solid #333;border-top:none;max-width:320px;}
.ph-stack-totals td{padding:5px 10px;font-size:11.5px;border-top:1px solid #eee;}
.ph-stack-totals td:last-child{text-align:right;font-family:var(--font-mono);}
.ph-stack-totals tr.strong td{font-weight:700;border-top:1.5px solid #333;}
.ph-terms-bank{margin-top:14px;border:1px solid #333;}
.ph-terms-bank td{border-right:1px solid #333;padding:10px;vertical-align:top;width:50%;}
.ph-terms-bank td:last-child{border-right:none;}
.ph-hsn{margin-top:14px;border:1px solid #333;}
.ph-hsn th,.ph-hsn td{border:1px solid #333;padding:5px 8px;font-size:10.8px;}
.ph-hsn th{background:#e5e5e5;}
.ph-tax-words{font-size:10.5px;font-weight:700;margin-top:6px;}
.ph-footer{margin-top:34px;}
.ph-sig-block{text-align:right;}
.ph-sig-name{font-family:'Brush Script MT',cursive;font-size:22px;color:#1F4E5F;}
.ph-sig-title{font-size:11px;font-weight:700;border-top:1px solid #333;display:inline-block;padding-top:3px;margin-top:2px;}

@media(max-width:900px){
  .sidebar{position:fixed;left:-230px;transition:left .2s;z-index:50;}
  .sidebar.open{left:0;}
  .hamburger{display:block;}
}

/* ============================================================
   MOBILE: bottom tab bar (replaces sidebar under 768px)
   ============================================================ */
.bottom-nav{display:none;}
.doctype-badge{display:inline-block;padding:4px 12px;border-radius:6px;font-size:11.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;}
.doctype-invoice{background:var(--blue-light);color:var(--blue);}
.doctype-proforma{background:#EAE6FB;color:#5B3FBF;}
.doctype-proposal{background:#FFF0E0;color:#B36B00;}
.badge-draft{background:var(--grey-bg);color:var(--text-muted);}
.badge-sent{background:var(--blue-light);color:var(--blue);}
.badge-accepted{background:var(--green-bg);color:var(--green);}
.badge-rejected{background:var(--red-bg);color:var(--red);}
.badge-expired{background:#F8D7D5;color:#7A1712;}
.doctype-picker{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.doctype-picker button{
  flex:1;min-width:120px;padding:13px;border-radius:12px;border:2px solid var(--line);background:#fff;
  font-weight:700;font-size:13px;color:var(--text-muted);text-align:center;
  transition:all .16s var(--ease);
}
.doctype-picker button:hover{border-color:var(--blue-2);color:var(--blue);transform:translateY(-1px);box-shadow:var(--shadow);}
.doctype-picker button.active{border-color:var(--blue);color:#fff;background:linear-gradient(135deg,var(--blue),var(--blue-2));box-shadow:0 4px 14px rgba(46,117,182,.3);}
.sticky-bottom-bar{display:none;}

@media(max-width:768px){
  #appShell{display:block;}
  .sidebar{display:none;}
  .hamburger{display:none;}
  .main{width:100%;}
  .content{padding:16px 14px 130px;}
  .topbar{padding:12px 14px;flex-wrap:wrap;gap:10px;}
  .topbar h1{font-size:16.5px;}
  #topbarActions{width:100%;}
  #topbarActions .btn{flex:1;justify-content:center;}

  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;
    background:var(--navy);z-index:60;box-shadow:0 -2px 12px rgba(0,0,0,.18);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .bottom-nav button{

function uid(){ return (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2)); }

function inr(n, opts){
  opts = opts || {};
  n = Number(n)||0;
  const neg = n < 0; n = Math.abs(n);
  let [intPart, dec] = n.toFixed(2).split('.');
  let out;
  if(intPart.length > 3){
    const last3 = intPart.slice(-3);
    let rest = intPart.slice(0,-3);
    const groups = [];
    while(rest.length > 2){ groups.unshift(rest.slice(-2)); rest = rest.slice(0,-2); }
    if(rest) groups.unshift(rest);
    out = groups.join(',') + ',' + last3;
  } else out = intPart;
  let str = (opts.symbol===false ? '' : '₹') + out + (opts.noDecimals ? '' : '.'+dec);
  return neg ? '('+str+')' : str;
}

function fmtDate(d){
  if(!d) return '—';
  const dt = (d instanceof Date) ? d : new Date(d+'T00:00:00');
  if(isNaN(dt.getTime())) return '—';
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return String(dt.getDate()).padStart(2,'0')+'-'+months[dt.getMonth()]+'-'+dt.getFullYear();
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function financialYear(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const y = d.getFullYear(), m = d.getMonth()+1;
  return m>=4 ? `${y}-${String(y+1).slice(-2)}` : `${y-1}-${String(y).slice(-2)}`;
}

function numberToWordsINR(num){
  const a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function two(n){ if(n<20) return a[n]; return b[Math.floor(n/10)] + (n%10? ' '+a[n%10]:''); }
  function three(n){ if(n>99) return a[Math.floor(n/100)]+' Hundred'+(n%100? ' '+two(n%100):''); return two(n); }
  num = Math.round(Math.abs(num));
  if(num===0) return 'Zero';
  let str='';
  const crore=Math.floor(num/10000000); num%=10000000;
  const lakh=Math.floor(num/100000); num%=100000;
  const thousand=Math.floor(num/1000); num%=1000;
  const rest=num;
  if(crore) str+=three(crore)+' Crore ';
  if(lakh) str+=three(lakh)+' Lakh ';
  if(thousand) str+=three(thousand)+' Thousand ';
  if(rest) str+=three(rest);
  return str.trim();
}

async function sha256Hex(str){
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function recomputeInvoiceStatuses(){
  const today = todayISO();
  STATE.invoices.forEach(inv=>{
    if(inv.cancelled){ inv._status = 'Cancelled'; return; }
    if(docType(inv)==='proposal'){
      let st = inv.proposal_status || 'Draft';
      if(inv.valid_until && inv.valid_until < today && !['Accepted','Rejected'].includes(st)) st = 'Expired';
      inv._status = st;
      return;
    }
    const due = Number(inv.due_amount)||0;
    if(due <= 0.004){ inv._status = 'Paid'; }
    else if(Number(inv.amount_paid)>0){ inv._status = (inv.due_date && inv.due_date < today) ? 'Overdue' : 'Partial'; }
    else { inv._status = (inv.due_date && inv.due_date < today) ? 'Overdue' : 'Unpaid'; }
  });
}

const DOCTYPE_FIELD_MAP = {
  proposal: {prefix:'proposal_prefix', counter:'proposal_counter', lastFy:'last_proposal_fy'},
  proforma: {prefix:'proforma_prefix', counter:'proforma_counter', lastFy:'last_proforma_fy'},
  invoice:  {prefix:'invoice_prefix',  counter:'invoice_counter',  lastFy:'last_counter_fy'},
};
async function generateInvoiceNumber(docTypeArg){
  const type = docTypeArg || 'invoice';
  const f = DOCTYPE_FIELD_MAP[type];
  const s = STATE.settings;
  const today = new Date();
  const fy = financialYear(today.toISOString().slice(0,10));
  let counter = s[f.counter] || 1;
  if(s.fy_reset_enabled && s[f.lastFy] && s[f.lastFy] !== fy){ counter = 1; }
  const seq = String(counter).padStart(s.seq_padding || 4, '0');
  const yy = String(today.getFullYear()).slice(-2);
  const yyyy = String(today.getFullYear());
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const format = s.invoice_format || '{prefix}/{yy}/{mm}/{seq}';
  const no = format
    .replace('{prefix}', s[f.prefix] || type.toUpperCase())
    .replace('{yyyy}', yyyy)
    .replace('{yy}', yy)
    .replace('{mm}', mm)
    .replace('{seq}', seq);
  return {no, fy, counter, docType:type};
}
async function commitInvoiceNumberCounter(type, fy, counter){
  const f = DOCTYPE_FIELD_MAP[type||'invoice'];
  const patch = {};
  patch[f.counter] = counter+1;
  patch[f.lastFy] = fy;
  await sb.from('business_settings').update(patch).eq('id','default');
  STATE.settings[f.counter] = counter+1;
  STATE.settings[f.lastFy] = fy;
}

  const y = now.getFullYear(), m = now.getMonth();
  function iso(d){ return d.toISOString().slice(0,10); }
  if(preset==='this-month') return {from: iso(new Date(y,m,1)), to: iso(new Date(y,m+1,0))};
  if(preset==='last-month') return {from: iso(new Date(y,m-1,1)), to: iso(new Date(y,m,0))};
  if(preset==='fy'){
    const fyStartYear = m>=3 ? y : y-1;
    return {from: iso(new Date(fyStartYear,3,1)), to: iso(new Date(fyStartYear+1,2,31))};
  }
  if(preset==='last-fy'){
    const fyStartYear = (m>=3 ? y : y-1) - 1;
    return {from: iso(new Date(fyStartYear,3,1)), to: iso(new Date(fyStartYear+1,2,31))};
  }
  if(preset==='all') return {from:null, to:null};
  return {from:null, to:null};
}

function filteredInvoices(from, to, clientId){
  return STATE.invoices.filter(inv=>{
    if(!isRealInvoice(inv)) return false;
    if(inv.cancelled) return false;
    if(from && inv.invoice_date < from) return false;
    if(to && inv.invoice_date > to) return false;
    if(clientId && clientId!=='all' && inv.client_id !== clientId) return false;
    return true;
  });
}

function openModal(title, bodyHtml, footHtml){
  const existing = document.getElementById('modalOverlay');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });
  overlay.querySelector('[data-action="close-modal"]').addEventListener('click', closeModal);
  return overlay;
}

    line_items: (inv.line_items && inv.line_items.length) ? inv.line_items.map(li=>({...li, id: li.id||uid()})) : [newLineItem()],
    terms: inv.terms||'',
    notes: inv.notes||'',
    round_off_mode: 'manual',
    manual_round_off: Number(inv.round_off)||0,
    initial_payment:{amount:0, mode:'Bank Transfer', date: todayISO(), note:''},
    payments_log: inv.payments_log || [],
    cancelled: !!inv.cancelled,
  };
}

/* ============================================================
   TOTALS
   ============================================================ */
function computeDraftTotals(draft){
  let taxable=0, cgst=0, sgst=0, igst=0;
  draft.line_items.forEach(li=>{
    const t = (Number(li.qty)||0) * (Number(li.rate)||0);
    taxable += t;
    const gstAmt = t * (Number(li.gstPercent)||0) / 100;
    if(draft.supply_type==='inter'){ igst += gstAmt; }
    else { cgst += gstAmt/2; sgst += gstAmt/2; }
  });
  const rawTotal = taxable + cgst + sgst + igst;
  let roundOff = 0;
  if(draft.round_off_mode==='down') roundOff = Math.floor(rawTotal) - rawTotal;
  else if(draft.round_off_mode==='nearest') roundOff = Math.round(rawTotal) - rawTotal;
  else if(draft.round_off_mode==='manual') roundOff = Number(draft.manual_round_off)||0;
  else roundOff = 0;
  const grandTotal = rawTotal + roundOff;
  const paidFromLog = draft.payments_log.reduce((s,p)=>s+Number(p.amount||0),0);
  const initialPay = Number(draft.initial_payment?.amount)||0;
  const paid = paidFromLog + (draft.id ? 0 : initialPay);
  const due = grandTotal - paid;
  return {taxable, cgst, sgst, igst, rawTotal, roundOff, grandTotal, paid, due};
}

function renderCustomFields(){
  const wrap = document.getElementById('customFieldsList');
  if(!wrap) return;
  wrap.innerHTML = DRAFT.custom_fields.map((f,idx)=>`
    <div class="custom-field-row">
      <input type="text" placeholder="Field label" value="${escapeHtml(f.label)}" data-cf-label="${idx}">
      <input type="text" placeholder="Value" value="${escapeHtml(f.value)}" data-cf-value="${idx}">
      <button class="btn btn-sm btn-ghost" data-action="remove-custom-field" data-idx="${idx}">✕</button>
    </div>`).join('');
  wrap.querySelectorAll('[data-cf-label]').forEach(inp=>inp.addEventListener('input', e=>{ DRAFT.custom_fields[e.target.dataset.cfLabel].label = e.target.value; }));
  wrap.querySelectorAll('[data-cf-value]').forEach(inp=>inp.addEventListener('input', e=>{ DRAFT.custom_fields[e.target.dataset.cfValue].value = e.target.value; }));
  wrap.querySelectorAll('[data-action="remove-custom-field"]').forEach(btn=>btn.addEventListener('click', e=>{
    DRAFT.custom_fields.splice(parseInt(btn.dataset.idx,10),1); renderCustomFields();
  }));
}

function renderLineItems(){
  const body = document.getElementById('lineItemsBody');
  if(!body) return;
  const itemOptions = `<option value="">— custom —</option>` + STATE.items.map(it=>`<option value="${it.id}">${escapeHtml(it.name)}</option>`).join('');
  body.innerHTML = DRAFT.line_items.map((li,idx)=>{
    const taxable = (Number(li.qty)||0)*(Number(li.rate)||0);
    return `<tr data-row="${idx}">
      <td data-label="Item">
        <select data-li="itemPick" data-idx="${idx}" style="margin-bottom:4px;">${itemOptions}</select>
        <input type="text" data-li="description" data-idx="${idx}" value="${escapeHtml(li.description)}" placeholder="Description">
      </td>
      <td data-label="HSN/SAC"><input type="text" data-li="hsn" data-idx="${idx}" value="${escapeHtml(li.hsn)}"></td>
      <td data-label="Qty"><input type="number" data-li="qty" data-idx="${idx}" value="${li.qty}" step="0.01" min="0"></td>
      <td data-label="Rate (₹)"><input type="number" data-li="rate" data-idx="${idx}" value="${li.rate}" step="0.01" min="0"></td>
      <td data-label="GST %">
        <select data-li="gstPercent" data-idx="${idx}">
          ${[0,5,12,18,28].map(g=>`<option value="${g}" ${Number(li.gstPercent)===g?'selected':''}>${g}%</option>`).join('')}
        </select>
      </td>
      <td class="num" data-label="Taxable" id="taxableCell-${idx}">${inr(taxable)}</td>
      <td><button class="btn btn-sm btn-ghost" data-action="remove-line-item" data-idx="${idx}" ${DRAFT.line_items.length<=1?'disabled':''}>✕</button></td>
    </tr>`;
  }).join('');

  body.querySelectorAll('[data-li="itemPick"]').forEach(sel=>sel.addEventListener('change', e=>{
    const idx = parseInt(e.target.dataset.idx,10);
    const it = itemById(e.target.value);
    if(it){
      DRAFT.line_items[idx].description = it.name;
      DRAFT.line_items[idx].hsn = it.hsn||'';
      DRAFT.line_items[idx].rate = Number(it.default_rate)||0;
      DRAFT.line_items[idx].gstPercent = Number(it.gst_percent)||18;
    }
    renderLineItems(); renderTotalsPanel();
  }));
  body.querySelectorAll('[data-li="description"]').forEach(inp=>inp.addEventListener('input', e=>{ DRAFT.line_items[e.target.dataset.idx].description = e.target.value; }));
  body.querySelectorAll('[data-li="hsn"]').forEach(inp=>inp.addEventListener('input', e=>{ DRAFT.line_items[e.target.dataset.idx].hsn = e.target.value; }));
  body.querySelectorAll('[data-li="qty"]').forEach(inp=>inp.addEventListener('input', e=>{
    const idx = e.target.dataset.idx;
    DRAFT.line_items[idx].qty = e.target.value;
    updateLineItemTaxableCell(idx); renderTotalsPanel();
  }));
  body.querySelectorAll('[data-li="rate"]').forEach(inp=>inp.addEventListener('input', e=>{
    const idx = e.target.dataset.idx;
    DRAFT.line_items[idx].rate = e.target.value;
    updateLineItemTaxableCell(idx); renderTotalsPanel();
  }));
  body.querySelectorAll('[data-li="gstPercent"]').forEach(sel=>sel.addEventListener('change', e=>{ DRAFT.line_items[e.target.dataset.idx].gstPercent = e.target.value; renderTotalsPanel(); }));
  body.querySelectorAll('[data-action="remove-line-item"]').forEach(btn=>btn.addEventListener('click', e=>{
    if(DRAFT.line_items.length<=1) return;
    DRAFT.line_items.splice(parseInt(btn.dataset.idx,10),1); renderLineItems(); renderTotalsPanel();
  }));
}

function updateLineItemTaxableCell(idx){
  const li = DRAFT.line_items[idx];
  const taxable = (Number(li.qty)||0)*(Number(li.rate)||0);
  const cell = document.getElementById('taxableCell-'+idx);
  if(cell) cell.textContent = inr(taxable);
}

function renderTotalsPanel(){
  const panel = document.getElementById('totalsPanel');
  if(!panel) return;
  const t = computeDraftTotals(DRAFT);
  const isProposal = DRAFT.doc_type==='proposal';
  const totalLabel = isProposal ? 'Estimated Total' : 'Grand Total';
  const gstLabel = DRAFT.supply_type==='inter' ? [['IGST', t.igst]] : [['CGST', t.cgst],['SGST', t.sgst]];
  panel.innerHTML = `
    <table style="font-size:13px;">
      <tbody>
        <tr><td>Taxable Amount</td><td class="num">${inr(t.taxable)}</td></tr>
        ${gstLabel.map(([l,v])=>`<tr><td>${l}</td><td class="num">${inr(v)}</td></tr>`).join('')}
        <tr><td>Round Off</td><td class="num">${inr(t.roundOff)}</td></tr>
        <tr class="tfoot-row"><td>${totalLabel}</td><td class="num">${inr(t.grandTotal)}</td></tr>
        ${!isProposal ? `
        <tr><td>Amount Paid</td><td class="num" style="color:var(--green);">${inr(t.paid)}</td></tr>
        <tr><td>Due</td><td class="num" style="color:${t.due>0.004?'var(--red)':'var(--green)'};">${inr(t.due)}</td></tr>` : ''}
      </tbody>
    </table>
    <div class="hint" style="margin-top:8px;">${numberToWordsINR(t.grandTotal)} Rupees Only</div>
  `;
  const stickyAmt = document.getElementById('stickyTotalAmt');
  if(stickyAmt) stickyAmt.textContent = inr(t.grandTotal);
}

function renderPaymentsLog(){
  const wrap = document.getElementById('paymentsLogList');
  if(!wrap) return;
  if(DRAFT.payments_log.length===0){ wrap.innerHTML = `<div class="hint">No payments recorded yet.</div>`; return; }
  wrap.innerHTML = `<table><tbody>${DRAFT.payments_log.map((p,idx)=>`
    <tr><td>${fmtDate(p.date)}</td><td>${escapeHtml(p.mode)}</td><td class="num">${inr(p.amount)}</td>
    <td><button class="btn btn-sm btn-ghost" data-action="remove-payment" data-idx="${idx}">✕</button></td></tr>`).join('')}</tbody></table>`;
  wrap.querySelectorAll('[data-action="remove-payment"]').forEach(btn=>btn.addEventListener('click', ()=>{
    DRAFT.payments_log.splice(parseInt(btn.dataset.idx,10),1);
    renderPaymentsLog(); renderTotalsPanel();
  }));
}

function updateClientPreview(){
  const el = document.getElementById('clientPreview');
  if(!el) return;
  const c = clientById(DRAFT.client_id);
  el.innerHTML = c ? `${escapeHtml(c.address||'')} ${c.city?', '+escapeHtml(c.city):''} ${c.state?', '+escapeHtml(c.state):''}<br>GSTIN: ${escapeHtml(c.gstin||'—')} | PAN: ${escapeHtml(c.pan||'—')}` : '';
}

function bindInvoiceFormEvents(mount, actions){
  document.getElementById('f_invoice_no').addEventListener('input', e=>DRAFT.invoice_no=e.target.value);
  document.getElementById('f_invoice_date').addEventListener('change', e=>DRAFT.invoice_date=e.target.value);
  document.getElementById('f_date_field').addEventListener('change', e=>{
    if(DRAFT.doc_type==='invoice') DRAFT.due_date = e.target.value;
    else DRAFT.valid_until = e.target.value;
  });
  document.getElementById('f_po_number').addEventListener('input', e=>DRAFT.po_number=e.target.value);
  document.getElementById('f_order_no').addEventListener('input', e=>DRAFT.order_no=e.target.value);
  document.getElementById('f_dispatched').addEventListener('input', e=>DRAFT.dispatched_through=e.target.value);
  document.getElementById('f_supply_type').addEventListener('change', e=>{ DRAFT.supply_type=e.target.value; renderTotalsPanel(); });
  const propStatus = document.getElementById('f_proposal_status');
  if(propStatus) propStatus.addEventListener('change', e=>DRAFT.proposal_status=e.target.value);
  document.getElementById('f_client_id').addEventListener('change', e=>{ DRAFT.client_id=e.target.value; updateClientPreview(); });
  document.getElementById('f_ship_same').addEventListener('change', e=>{
    DRAFT.ship_same_as_bill = e.target.checked;
    document.getElementById('shipToBlock').style.display = e.target.checked ? 'none':'block';
  });
  const shipAddr = document.getElementById('f_ship_address'); if(shipAddr) shipAddr.addEventListener('input', e=>DRAFT.ship_to.address=e.target.value);
  const shipCity = document.getElementById('f_ship_city'); if(shipCity) shipCity.addEventListener('input', e=>DRAFT.ship_to.city=e.target.value);
  const shipState = document.getElementById('f_ship_state'); if(shipState) shipState.addEventListener('input', e=>DRAFT.ship_to.state=e.target.value);
  const shipPin = document.getElementById('f_ship_pincode'); if(shipPin) shipPin.addEventListener('input', e=>DRAFT.ship_to.pincode=e.target.value);
  document.getElementById('f_terms').addEventListener('input', e=>DRAFT.terms=e.target.value);
  document.getElementById('f_notes').addEventListener('input', e=>DRAFT.notes=e.target.value);
  document.getElementById('f_round_mode').addEventListener('change', e=>{
    DRAFT.round_off_mode = e.target.value;
    document.getElementById('manualRoundWrap').style.display = e.target.value==='manual' ? 'block':'none';
    renderTotalsPanel();
  });
  const manualRound = document.getElementById('f_manual_round');
  if(manualRound) manualRound.addEventListener('input', e=>{ DRAFT.manual_round_off = e.target.value; renderTotalsPanel(); });

  const payAmt = document.getElementById('f_pay_amount');
  if(payAmt){
    payAmt.addEventListener('input', e=>{ DRAFT.initial_payment.amount = e.target.value; renderTotalsPanel(); });
    document.getElementById('f_pay_mode').addEventListener('change', e=>DRAFT.initial_payment.mode=e.target.value);
    document.getElementById('f_pay_date').addEventListener('change', e=>DRAFT.initial_payment.date=e.target.value);
  }

  mount.querySelectorAll('[data-doctype]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const type = btn.dataset.doctype;
    if(type===DRAFT.doc_type) return;
    STATE.newDocType = type;
    DRAFT = newDraftInvoice(type);
    const gen = await generateInvoiceNumber(type);
    DRAFT.invoice_no = gen.no; DRAFT._genFy = gen.fy; DRAFT._genCounter = gen.counter;
    renderInvoiceForm(mount, actions);
  }));

  mount.querySelector('[data-action="add-custom-field"]').addEventListener('click', ()=>{
    DRAFT.custom_fields.push({label:'',value:''}); renderCustomFields();
  });
  mount.querySelector('[data-action="add-line-item"]').addEventListener('click', ()=>{
    DRAFT.line_items.push(newLineItem()); renderLineItems(); renderTotalsPanel();
  });
  mount.querySelector('[data-action="add-client-inline"]').addEventListener('click', ()=>{
    openQuickAddClient(client=>{ DRAFT.client_id = client.id; renderInvoiceForm(mount, actions); });
  });
  const addPayBtn = mount.querySelector('[data-action="add-payment"]');
  if(addPayBtn) addPayBtn.addEventListener('click', ()=>openRecordPaymentModal());

  actions.querySelectorAll('[data-action="cancel-form"]').forEach(b=>b.addEventListener('click', ()=>{ DRAFT=null; navigate('invoices'); }));
  document.querySelectorAll('[data-action="save-invoice"]').forEach(b=>b.addEventListener('click', ()=>saveInvoice()));
  const sigCheck = document.getElementById('f_include_sig');
  if(sigCheck) sigCheck.addEventListener('change', e=>{ PRINT_INCLUDE_SIGNATURE = e.target.checked; });
  const printBtn = actions.querySelector('[data-action="print-current"]');
  if(printBtn) printBtn.addEventListener('click', ()=>printInvoiceById(DRAFT.id, PRINT_INCLUDE_SIGNATURE));
  actions.querySelectorAll('[data-action="convert-doc"]').forEach(b=>b.addEventListener('click', ()=>{
    confirmDialog(`Create a new ${DOC_TYPES[b.dataset.target].label} from this ${DOC_TYPES[DRAFT.doc_type].label}? A fresh number will be generated and this original stays unchanged.`, ()=>{
      convertDocument(DRAFT.id, b.dataset.target);
    });
  }));
}

function openRecordPaymentModal(){
  const body = `
    <div class="field"><label>Amount (₹)</label><input id="rp_amount" type="number" step="0.01"></div>
    <div class="field-row">
      <div class="field"><label>Date</label><input id="rp_date" type="date" value="${todayISO()}"></div>
      <div class="field"><label>Mode</label>
        <select id="rp_mode">${['Bank Transfer','UPI','Cash','Cheque','Other'].map(m=>`<option>${m}</option>`).join('')}</select>
      </div>
    </div>
    <div class="field"><label>Note</label><input id="rp_note" type="text"></div>
  `;
  const overlay = openModal('Record Payment', body,
    `<button class="btn" data-action="close-modal">Cancel</button><button class="btn btn-primary" id="rpSave">Add Payment</button>`);
  overlay.querySelector('#rpSave').addEventListener('click', ()=>{
    const amount = parseFloat(document.getElementById('rp_amount').value)||0;
    if(amount<=0){ toast('Enter a valid amount','error'); return; }
    DRAFT.payments_log.push({date:document.getElementById('rp_date').value, amount, mode:document.getElementById('rp_mode').value, note:document.getElementById('rp_note').value});
    closeModal();
    renderPaymentsLog(); renderTotalsPanel();
  });
}

/* ============================================================
   SAVE INVOICE
   ============================================================ */
async function saveInvoice(){
  if(!DRAFT.client_id){ toast('Please select a client','error'); return; }
  if(!DRAFT.invoice_no.trim()){ toast(`${DOC_TYPES[DRAFT.doc_type].label} number is required`,'error'); return; }
  if(DRAFT.line_items.every(li=>!li.description.trim())){ toast('Add at least one line item','error'); return; }

  const t = computeDraftTotals(DRAFT);
  const isProposal = DRAFT.doc_type==='proposal';
  const payload = {
    doc_type: DRAFT.doc_type,
    invoice_no: DRAFT.invoice_no.trim(),
    invoice_date: DRAFT.invoice_date,
    due_date: DRAFT.doc_type==='invoice' ? (DRAFT.due_date || null) : null,
    valid_until: DRAFT.doc_type!=='invoice' ? (DRAFT.valid_until || null) : null,
    proposal_status: isProposal ? DRAFT.proposal_status : null,
    po_number: DRAFT.po_number,
    dispatched_through: DRAFT.dispatched_through,
    order_no: DRAFT.order_no,
    supply_type: DRAFT.supply_type,
    client_id: DRAFT.client_id,
    ship_same_as_bill: DRAFT.ship_same_as_bill,
    ship_to: DRAFT.ship_to,
    custom_fields: DRAFT.custom_fields.filter(f=>f.label.trim()),
    line_items: DRAFT.line_items.filter(li=>li.description.trim()),
    terms: DRAFT.terms,
    notes: DRAFT.notes,
    taxable_total: t.taxable,
    cgst_total: t.cgst,
    sgst_total: t.sgst,
    igst_total: t.igst,
    round_off: t.roundOff,
    grand_total: t.grandTotal,
    amount_paid: isProposal ? 0 : t.paid,
    due_amount: isProposal ? 0 : t.due,
    cancelled: DRAFT.cancelled,
    payments_log: isProposal ? [] : DRAFT.payments_log,
    updated_at: new Date().toISOString(),
  };

  if(!isProposal && !DRAFT.id && Number(DRAFT.initial_payment.amount)>0){
    payload.payments_log = [...DRAFT.payments_log, {
      date: DRAFT.initial_payment.date, amount: Number(DRAFT.initial_payment.amount),
      mode: DRAFT.initial_payment.mode, note: DRAFT.initial_payment.note||'Initial payment'
    }];
  }

  let result;
  if(DRAFT.id){
    result = await sb.from('invoices').update(payload).eq('id', DRAFT.id).select().single();
  } else {
    result = await sb.from('invoices').insert(payload).select().single();
  }
  if(result.error){ toast('Save failed: '+result.error.message,'error'); return; }

  if(!DRAFT.id && DRAFT._genFy){
    await commitInvoiceNumberCounter(DRAFT.doc_type, DRAFT._genFy, DRAFT._genCounter);
  }

  toast(DRAFT.id ? `${DOC_TYPES[DRAFT.doc_type].label} updated` : `${DOC_TYPES[DRAFT.doc_type].label} saved`, 'success');
  DRAFT = null;
  STATE.editingInvoiceId = null;
  await fetchInvoices();
  navigate('invoices');
}

function renderInvoicesList(mount, actions){
  actions.innerHTML = `<button class="btn btn-primary" data-nav="invoice-form">＋ New</button>
    <button class="btn" data-action="export-invoices-excel">⬇ Export Excel</button>`;
  actions.querySelector('[data-nav]').addEventListener('click', ()=>navigate('invoice-form'));
  actions.querySelector('[data-action="export-invoices-excel"]').addEventListener('click', exportInvoicesExcel);

  const f = STATE.invoiceFilter;
  const statusOptionsByType = {
    all: ['all','Paid','Partial','Unpaid','Overdue','Draft','Sent','Accepted','Rejected','Expired','Cancelled'],
    proposal: ['all','Draft','Sent','Accepted','Rejected','Expired','Cancelled'],
    proforma: ['all','Paid','Partial','Unpaid','Overdue','Cancelled'],
    invoice: ['all','Paid','Partial','Unpaid','Overdue','Cancelled'],
  };
  const statusOptions = statusOptionsByType[f.docType] || statusOptionsByType.all;

function getFilteredInvoicesForList(){
  const f = STATE.invoiceFilter;
  return STATE.invoices.filter(inv=>{
    if(f.docType && f.docType!=='all' && docType(inv)!==f.docType) return false;
    if(f.clientId!=='all' && inv.client_id!==f.clientId) return false;
    if(f.status!=='all' && inv._status!==f.status) return false;
    if(f.from && inv.invoice_date < f.from) return false;
    if(f.to && inv.invoice_date > f.to) return false;
    if(f.q){
      const c = clientById(inv.client_id);
      const hay = (inv.invoice_no+' '+(c?c.name:'')).toLowerCase();
      if(!hay.includes(f.q.toLowerCase())) return false;
    }
    return true;
  });
}

      convertDocument(b.dataset.id, b.dataset.target);
    });

  wrap.querySelectorAll('[data-action="cancel-invoice"]').forEach(b=>b.addEventListener('click', ()=>{

      const {error} = await sb.from('invoices').update({cancelled:true}).eq('id', b.dataset.id);
      if(error) return toast('Failed: '+error.message,'error');
      await fetchInvoices(); renderInvoicesTable(); toast('Cancelled','success');

function convertDocument(id, targetType){
  const inv = STATE.invoices.find(i=>i.id===id);
  if(!inv) return;
  DRAFT = loadDraftFromInvoice(inv);
  DRAFT.id = null;
  DRAFT.invoice_no_locked = false;
  DRAFT.doc_type = targetType;
  DRAFT.invoice_date = todayISO();
  DRAFT.payments_log = [];
  DRAFT.due_date = '';
  DRAFT.valid_until = targetType!=='invoice' ? addDays(todayISO(), targetType==='proposal'?15:7) : '';
  DRAFT.proposal_status = 'Draft';
  STATE.editingInvoiceId = null;
  STATE.newDocType = targetType;
  generateInvoiceNumber(targetType).then(gen=>{
    DRAFT.invoice_no = gen.no; DRAFT._genFy = gen.fy; DRAFT._genCounter = gen.counter;
    navigate('invoice-form',{keepEditing:true});
  });
}
function duplicateInvoice(id){
  const inv = STATE.invoices.find(i=>i.id===id);
  if(!inv) return;
  convertDocument(id, docType(inv));
}

function getLedgerInvoices(){
  const lf = STATE.ledgerFilter;
  return STATE.invoices
    .filter(inv=>isRealInvoice(inv))
    .filter(inv=>!inv.cancelled)
    .filter(inv=> lf.clientId==='all' || inv.client_id===lf.clientId)
    .filter(inv=> !lf.from || inv.invoice_date >= lf.from)
    .filter(inv=> !lf.to || inv.invoice_date <= lf.to)
    .sort((a,b)=> a.invoice_date.localeCompare(b.invoice_date));
}

function ledgerTotals(list){
  return {
    qty: list.reduce((s,i)=>s+(i.line_items||[]).reduce((a,li)=>a+(Number(li.qty)||0),0),0),
    taxable: list.reduce((s,i)=>s+Number(i.taxable_total||0),0),
    cgst: list.reduce((s,i)=>s+Number(i.cgst_total||0),0),
    sgst: list.reduce((s,i)=>s+Number(i.sgst_total||0),0),
    igst: list.reduce((s,i)=>s+Number(i.igst_total||0),0),
    roundOff: list.reduce((s,i)=>s+Number(i.round_off||0),0),
    total: list.reduce((s,i)=>s+Number(i.grand_total||0),0),
    paid: list.reduce((s,i)=>s+Number(i.amount_paid||0),0),
  };
}

function itemSummary(inv){
  const lis = inv.line_items||[];
  if(lis.length===0) return '—';
  if(lis.length===1) return escapeHtml(lis[0].description);
  return escapeHtml(lis[0].description) + ` +${lis.length-1} more`;
}

function exportLedgerExcel(){
  const list = getLedgerInvoices();
  if(list.length===0){ toast('No data to export','error'); return; }
  const lf = STATE.ledgerFilter;
  const showClientCol = lf.clientId==='all';
  const rows = list.map((inv,idx)=>{
    const cc = clientById(inv.client_id);
    const qty = (inv.line_items||[]).reduce((a,li)=>a+(Number(li.qty)||0),0);
    const row = {
      'S.No': idx+1, 'Invoice No': inv.invoice_no, 'Invoice Date': inv.invoice_date, 'PO Number': inv.po_number||'',
    };
    if(showClientCol) row['Client'] = cc?cc.name:'';
    row['Item'] = itemSummary(inv).replace(/&amp;/g,'&');
    row['Qty'] = qty;
    row['Taxable Amount'] = Number(inv.taxable_total)||0;
    row['CGST'] = Number(inv.cgst_total)||0;
    row['SGST'] = Number(inv.sgst_total)||0;
    row['IGST'] = Number(inv.igst_total)||0;
    row['Round Off'] = Number(inv.round_off)||0;
    row['Total Invoice'] = Number(inv.grand_total)||0;
    row['Amount Paid'] = Number(inv.amount_paid)||0;
    row['Status'] = inv._status;
    return row;
  });
  const t = ledgerTotals(list);
  const totalRow = {'S.No':'', 'Invoice No':'TOTAL', 'Invoice Date':'', 'PO Number':''};

  totalRow['Round Off']=t.roundOff; totalRow['Total Invoice']=t.total; totalRow['Amount Paid']=t.paid; totalRow['Status']='';

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  const c = lf.clientId!=='all' ? clientById(lf.clientId) : null;
  XLSX.utils.book_append_sheet(wb, ws, 'Ledger');
  XLSX.writeFile(wb, `Ledger_${c?c.name.replace(/[^a-z0-9]/gi,'_'):'All_Clients'}_${todayISO()}.xlsx`);
}

function printStatusPill(status){
  const colors = {
    'Paid':['#E6F4EA','#1E7B34'], 'Partial':['#FFF4DD','#9A6B00'], 'Unpaid':['#FCEAEA','#B3261E'],
    'Overdue':['#F8D7D5','#7A1712'], 'Cancelled':['#EEF1F5','#5B6B7A'],
    'Draft':['#EEF1F5','#5B6B7A'], 'Sent':['#EAF1FB','#2E75B6'], 'Accepted':['#E6F4EA','#1E7B34'],
    'Rejected':['#FCEAEA','#B3261E'], 'Expired':['#F8D7D5','#7A1712'],
  };
  const [bg,fg] = colors[status] || colors['Unpaid'];
  return `<span style="display:inline-block;padding:3px 12px;border-radius:5px;font-size:11px;font-weight:700;background:${bg};color:${fg};vertical-align:middle;">${escapeHtml(status)}</span>`;
}

function groupLineItemsByHsn(lineItems, showIgst){
  const map = {};
  lineItems.forEach(li=>{
    const hsn = li.hsn || '—';
    const taxable = (Number(li.qty)||0)*(Number(li.rate)||0);
    const gstAmt = taxable*(Number(li.gstPercent)||0)/100;
    if(!map[hsn]) map[hsn] = {hsn, taxable:0, cgst:0, sgst:0, igst:0, gstPercent:Number(li.gstPercent)||0};
    map[hsn].taxable += taxable;
    map[hsn].cgst += showIgst?0:gstAmt/2;
    map[hsn].sgst += showIgst?0:gstAmt/2;
    map[hsn].igst += showIgst?gstAmt:0;
  });
  return Object.values(map);
}

        </div>
        <div class="field-row">
          <div class="field"><label>Email</label><input id="s_email" type="email" value="${escapeHtml(s.email||'')}"></div>
          <div class="field"><label>Phone</label><input id="s_phone" type="text" value="${escapeHtml(s.phone||'')}"></div>
        </div>
        <div class="field"><label>Signatory Name</label><input id="s_sig_name" type="text" value="${escapeHtml(s.signatory_name||'')}"></div>
        <div class="field"><label>Signatory Title</label><input id="s_sig_title" type="text" value="${escapeHtml(s.signatory_title||'')}"></div>
        <div class="checkbox-row" style="margin-bottom:12px;">
          <input type="checkbox" id="s_sig_default" ${s.show_signature_default?'checked':''}>
          <label style="margin:0;" for="s_sig_default">Show signature block by default when printing</label>
        </div>
        <div class="hint" style="margin-bottom:12px;">You can still switch it on/off per document from the Print button — this is just the starting default. When off, the print footer shows "electronically generated, no signature required" instead.</div>
        <button class="btn btn-primary" data-action="save-profile">Save Profile</button>
      </div>

      <div>
        <div class="card card-pad" style="margin-bottom:16px;">
          <div class="section-title">Bank Details</div>
          <div class="field"><label>Account Name</label><input id="s_acc_name" type="text" value="${escapeHtml(s.account_name||'')}"></div>
          <div class="field"><label>Account Number</label><input id="s_acc_number" type="text" value="${escapeHtml(s.account_number||'')}"></div>
          <div class="field-row">
            <div class="field"><label>IFSC</label><input id="s_ifsc" type="text" value="${escapeHtml(s.ifsc||'')}"></div>
            <div class="field"><label>Account Type</label><input id="s_acc_type" type="text" value="${escapeHtml(s.account_type||'')}"></div>
          </div>
          <div class="field"><label>Bank Name</label><input id="s_bank_name" type="text" value="${escapeHtml(s.bank_name||'')}"></div>
          <button class="btn btn-primary" data-action="save-bank">Save Bank Details</button>
        </div>

        <div class="card card-pad" style="margin-bottom:16px;">
          <div class="section-title">Document Numbering</div>
          <div class="field-row">
            <div class="field"><label>Proposal Prefix</label><input id="s_proposal_prefix" type="text" value="${escapeHtml(s.proposal_prefix||'PROP')}"></div>
            <div class="field"><label>Next #</label><input id="s_proposal_counter" type="number" value="${s.proposal_counter||1}"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Proforma Prefix</label><input id="s_proforma_prefix" type="text" value="${escapeHtml(s.proforma_prefix||'PI')}"></div>
            <div class="field"><label>Next #</label><input id="s_proforma_counter" type="number" value="${s.proforma_counter||1}"></div>
          </div>
          <div class="field-row">
            <div class="field"><label>Tax Invoice Prefix</label><input id="s_prefix" type="text" value="${escapeHtml(s.invoice_prefix||'')}"></div>
            <div class="field"><label>Next #</label><input id="s_counter" type="number" value="${s.invoice_counter||1}"></div>
          </div>
          <div class="field"><label>Digits</label><input id="s_padding" type="number" value="${s.seq_padding||4}" style="max-width:120px;"></div>
          <div class="field">
            <label>Format (shared by all three)</label>
            <input id="s_format" type="text" value="${escapeHtml(s.invoice_format||'')}">
            <div class="hint">Tokens: {prefix} {yy} {yyyy} {mm} {seq} — e.g. {prefix}/{yy}/{mm}/{seq} → JVS/26/07/0001</div>
          </div>
          <div class="checkbox-row" style="margin-bottom:12px;">
            <input type="checkbox" id="s_fy_reset" ${s.fy_reset_enabled?'checked':''}>
            <label style="margin:0;" for="s_fy_reset">Reset sequence to 1 every new financial year (April)</label>
          </div>
          <button class="btn btn-primary" data-action="save-numbering">Save Numbering</button>
        </div>

        <div class="card card-pad" style="margin-bottom:16px;">
          <div class="section-title">Default Terms &amp; Conditions</div>
          <textarea id="s_terms" rows="4">${escapeHtml(s.terms||'')}</textarea>
          <button class="btn btn-primary" style="margin-top:10px;" data-action="save-terms">Save Terms</button>
        </div>

        <div class="card card-pad" style="margin-bottom:16px;">
          <div class="section-title">Security</div>
          <div class="field-row">
            <div class="field"><label>New PIN</label><input id="s_new_pin" type="password" inputmode="numeric" maxlength="8"></div>
            <div class="field"><label>Confirm PIN</label><input id="s_confirm_pin" type="password" inputmode="numeric" maxlength="8"></div>
          </div>
          <button class="btn" data-action="change-pin">Update PIN</button>
        </div>

        <div class="card card-pad">
          <div class="section-title">Backup &amp; Restore</div>
          <p class="hint" style="margin-bottom:12px;">Data already lives in Supabase (synced across devices). Use this to keep an offline copy or move data between projects.</p>
          <div class="btn-row">
            <button class="btn" data-action="export-backup">⬇ Export Full Backup (JSON)</button>
            <label class="btn" style="margin:0;">⬆ Import Backup<input type="file" id="importFile" accept="application/json" style="display:none;"></label>
          </div>
        </div>
      </div>
    </div>
  `;

  document.querySelector('[data-action="save-profile"]').addEventListener('click', async ()=>{
    const payload = {
      business_name: document.getElementById('s_business_name').value.trim(),
      address_line1: document.getElementById('s_addr1').value.trim(),
      address_line2: document.getElementById('s_addr2').value.trim(),
      gstin: document.getElementById('s_gstin').value.trim(),
      pan: document.getElementById('s_pan').value.trim(),
      email: document.getElementById('s_email').value.trim(),
      phone: document.getElementById('s_phone').value.trim(),
      signatory_name: document.getElementById('s_sig_name').value.trim(),
      signatory_title: document.getElementById('s_sig_title').value.trim(),
      show_signature_default: document.getElementById('s_sig_default').checked,
    };
    await saveSettingsPatch(payload, 'Profile saved');
  });

  const logoFile = document.getElementById('logoFile');
  if(logoFile) logoFile.addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 800*1024){ toast('Please use an image under 800KB','error'); return; }
    const reader = new FileReader();
    reader.onload = async ev=>{
      await saveSettingsPatch({logo_data_url: ev.target.result}, 'Logo saved');
      renderView();
    };
    reader.readAsDataURL(file);
  });
  const removeLogoBtn = document.querySelector('[data-action="remove-logo"]');
  if(removeLogoBtn) removeLogoBtn.addEventListener('click', async ()=>{
    await saveSettingsPatch({logo_data_url:null}, 'Logo removed');
    renderView();
  });

  document.querySelector('[data-action="save-bank"]').addEventListener('click', async ()=>{
    const payload = {
      account_name: document.getElementById('s_acc_name').value.trim(),
      account_number: document.getElementById('s_acc_number').value.trim(),
      ifsc: document.getElementById('s_ifsc').value.trim(),
      account_type: document.getElementById('s_acc_type').value.trim(),
      bank_name: document.getElementById('s_bank_name').value.trim(),
    };
    await saveSettingsPatch(payload, 'Bank details saved');
  });

  document.querySelector('[data-action="save-numbering"]').addEventListener('click', async ()=>{
    const payload = {
      invoice_prefix: document.getElementById('s_prefix').value.trim(),
      invoice_counter: parseInt(document.getElementById('s_counter').value,10)||1,
      proforma_prefix: document.getElementById('s_proforma_prefix').value.trim(),
      proforma_counter: parseInt(document.getElementById('s_proforma_counter').value,10)||1,
      proposal_prefix: document.getElementById('s_proposal_prefix').value.trim(),
      proposal_counter: parseInt(document.getElementById('s_proposal_counter').value,10)||1,
      seq_padding: parseInt(document.getElementById('s_padding').value,10)||4,
      invoice_format: document.getElementById('s_format').value.trim(),
      fy_reset_enabled: document.getElementById('s_fy_reset').checked,
    };
    await saveSettingsPatch(payload, 'Numbering saved');
  });

  document.querySelector('[data-action="save-terms"]').addEventListener('click', async ()=>{
    await saveSettingsPatch({terms: document.getElementById('s_terms').value}, 'Terms saved');
  });

  document.querySelector('[data-action="change-pin"]').addEventListener('click', async ()=>{
    const p1 = document.getElementById('s_new_pin').value.trim();
    const p2 = document.getElementById('s_confirm_pin').value.trim();
    if(p1.length<4){ toast('PIN must be at least 4 digits','error'); return; }
    if(p1!==p2){ toast('PINs do not match','error'); return; }
    const hash = await sha256Hex(p1);
    await saveSettingsPatch({pin_hash:hash}, 'PIN updated');
    document.getElementById('s_new_pin').value=''; document.getElementById('s_confirm_pin').value='';
  });

  document.querySelector('[data-action="export-backup"]').addEventListener('click', exportFullBackup);
  document.getElementById('importFile').addEventListener('change', importFullBackup);
}

async function saveSettingsPatch(payload, msg){
  const {error} = await sb.from('business_settings').update(payload).eq('id','default');
  if(error){ toast('Failed: '+error.message,'error'); return; }
  Object.assign(STATE.settings, payload);
  toast(msg,'success');
}

function exportFullBackup(){
  const data = {
    exported_at: new Date().toISOString(),
    settings: STATE.settings,
    clients: STATE.clients,
    items: STATE.items,
    invoices: STATE.invoices,
  };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `billing_backup_${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importFullBackup(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async ev=>{
    try{
      const data = JSON.parse(ev.target.result);
      confirmDialog(`This will insert ${data.clients?.length||0} clients, ${data.items?.length||0} items, and ${data.invoices?.length||0} invoices into your Supabase project. Existing records are not overwritten. Continue?`, async ()=>{
        if(data.clients?.length){ await sb.from('clients').upsert(data.clients); }
        if(data.items?.length){ await sb.from('items').upsert(data.items); }
        if(data.invoices?.length){ await sb.from('invoices').upsert(data.invoices); }
        await fetchAll();
        renderView();
        toast('Backup imported','success');
      });
    }catch(err){ toast('Invalid backup file','error'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ============================================================
   BOOT
   ============================================================ */
async function boot(){
  if(!initSupabase()){ renderConfigError(); return; }
  const settings = await fetchSettings();
  if(!settings){ renderConfigError(); return; }
  STATE.settings = settings;
  if(!settings.pin_hash){ renderSetPinScreen(); }
  else { renderPinLoginScreen(); }
}

document.addEventListener('DOMContentLoaded', boot);

</script>


</body>
</html>
